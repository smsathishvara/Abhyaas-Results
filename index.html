<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Apple School - Result Portal</title>
<style>
  :root{
    --pink:#e91e8c;
    --blue:#1a3fa0;
    --blue-row:#1e7be0;
    --red:#f15a5a;
    --purple:#9b2fc4;
    --border:#dfe3ea;
    --bg:#eef1f6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Segoe UI', Arial, sans-serif;
    display:flex;
    justify-content:center;
    padding:30px 14px;
  }
  .card{
    background:#fff;
    width:100%;
    max-width:680px;
    border-radius:10px;
    box-shadow:0 6px 24px rgba(20,30,60,.10);
    padding:30px 36px 26px;
  }
  .school{
    text-align:center;
    color:var(--pink);
    font-weight:800;
    font-size:26px;
    margin:0;
    letter-spacing:.3px;
  }
  .collab{
    text-align:center;
    color:var(--blue);
    font-weight:600;
    font-size:13px;
    margin:6px 0 2px;
  }
  .academy{
    text-align:center;
    color:var(--pink);
    font-weight:800;
    font-size:20px;
    margin:2px 0;
  }
  .town{
    text-align:center;
    color:var(--blue);
    font-weight:600;
    font-size:13px;
    margin:2px 0 14px;
  }
  hr.top{border:none;border-top:1px solid var(--border);margin:14px 0;}
  .test-title{
    text-align:center;
    color:var(--blue);
    font-weight:700;
    font-size:15px;
    margin:0 0 20px;
  }
  .search-row{
    display:flex;
    gap:10px;
    margin-bottom:22px;
  }
  .search-row input{
    flex:1;
    padding:11px 14px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:15px;
    outline:none;
  }
  .search-row input:focus{border-color:var(--pink);}
  .btn{
    border:none;
    border-radius:6px;
    padding:0 18px;
    font-size:14px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
  }
  .btn-search{background:#2e9b3f;}
  .btn-search:hover{background:#258433;}
  .btn-print{background:#2e9b3f;}
  .btn-print:hover{background:#258433;}
  table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:14px;
  }
  td,th{
    border:1px solid var(--border);
    padding:11px 14px;
    font-size:14.5px;
  }
  .info td:first-child{
    background:var(--blue-row);
    color:#fff;
    font-weight:700;
    width:40%;
  }
  .som-head{
    text-align:center;
    background:#f3f5f8;
    color:var(--blue);
    font-weight:700;
    padding:10px;
    border:1px solid var(--border);
  }
  .marks-head th{
    background:#1e88e5;
    color:#fff;
    font-weight:700;
  }
  .marks-head th:last-child{width:90px;text-align:left;}
  tr.total td{background:var(--red);color:#fff;font-weight:700;}
  tr.result td{background:var(--purple);color:#fff;font-weight:700;}
  .support{
    text-align:center;
    font-size:13px;
    margin-top:18px;
  }
  .support a{color:#2752d6;text-decoration:none;}
  .msg{
    text-align:center;
    padding:30px 10px;
    color:#777;
    font-size:14.5px;
  }
  .hidden{display:none;}
  @media print{
    body{background:#fff;padding:0;}
    .card{box-shadow:none;max-width:100%;}
    .search-row{display:none;}
  }
</style>
</head>

/* Pass mark: 35% of the total max marks of subjects that have been entered.
   Change PASS_PERCENT below if your school uses a different cut-off. */
const PASS_PERCENT = 35;

const SUBJECTS = [
  {key:'mbt', label:'Mathematics (Board Test) Max.Marks:30', max:30},
  {key:'mct', label:'Mathematics (Competitive Test) Max.Marks:20', max:20},
  {key:'sbt', label:'Science (Board Test) Max.Marks:30', max:30},
  {key:'sct', label:'Science (Competitive Test) Max.Marks:20', max:20}
];

function isNumeric(v){ return v !== '-' && v !== 'A' && v !== '' && v !== undefined && !isNaN(Number(v)); }

function render(student){
  const rows = SUBJECTS.map(s=>{
    const v = student[s.key];
    let display = v;
    if(v === 'A') display = 'Absent';
    return `<tr><td>${s.label}</td><td>${display}</td></tr>`;
  }).join('');

  const allEntered = SUBJECTS.every(s=>isNumeric(student[s.key]));
  let total = '-', result = '-', resultColor = '';
  if(allEntered){
    const sum = SUBJECTS.reduce((acc,s)=>acc+Number(student[s.key]),0);
    const maxSum = SUBJECTS.reduce((acc,s)=>acc+s.max,0);
    total = sum;
    const pass = sum >= (PASS_PERCENT/100)*maxSum;
    result = pass ? 'PASS' : 'FAIL';
  }

  document.getElementById('result').innerHTML = `
    <table class="info">
      <tr><td>Name</td><td>${student.name}</td></tr>
      <tr><td>Roll No.</td><td>${student.reg}</td></tr>
      <tr><td>Class</td><td>${student.cls}</td></tr>
      <tr><td>Section</td><td>${student.sec}</td></tr>
    </table>
    <table>
      <tr><th class="som-head" colspan="2">STATEMENT OF MARKS</th></tr>
      <tr class="marks-head"><th>Subject</th><th>Marks</th></tr>
      ${rows}
      <tr class="total"><td>Total</td><td>${total}</td></tr>
      <tr class="result"><td>Result</td><td>${result}</td></tr>
    </table>
    <p class="support">For support contact <a href="tel:9632318383">9632318383</a>, <a href="tel:9144844032">9144844032</a>, <a href="tel:8904329123">8904329123</a></p>
  `;
}

function doSearch(){
  const q = document.getElementById('searchBox').value.trim().toUpperCase();
  if(!q){
    document.getElementById('result').innerHTML = '<p class="msg">Enter a Roll No. / Password to view the result.</p>';
    return;
  }
  const student = STUDENTS.find(s => s.reg.toUpperCase() === q || s.pwd.toUpperCase() === q);
  if(!student){
    document.getElementById('result').innerHTML = '<p class="msg">No record found for "'+q+'". Please check and try again.</p>';
    return;
  }
  render(student);
}

document.getElementById('searchBox').addEventListener('keyup', function(e){
  if(e.key === 'Enter') doSearch();
});

document.getElementById('result').innerHTML = '<p class="msg">Enter a Roll No. / Password and click Search to view the result.</p>';
</script>
